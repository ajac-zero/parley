# Copy to secret.yaml, fill in real values, and never commit it.
#
#   APP_SECRET:   openssl rand -base64 32
#   DATABASE_URL: connection string for your managed/in-cluster Postgres
#   REDIS_URL:    connection string for your managed/in-cluster Redis
apiVersion: v1
kind: Secret
metadata:
  name: parley
  namespace: parley
type: Opaque
stringData:
  APP_SECRET: "REPLACE_ME"
  DATABASE_URL: "postgres://parley:REPLACE_ME@postgres:5432/parley"
  REDIS_URL: "redis://redis:6379"
