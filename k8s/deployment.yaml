apiVersion: v1
kind: Namespace
metadata:
  name: parley
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parley
  namespace: parley
  labels:
    app: parley
spec:
  # Parley is stateless (state lives in Postgres/Redis); scale freely.
  replicas: 2
  selector:
    matchLabels:
      app: parley
  template:
    metadata:
      labels:
        app: parley
    spec:
      containers:
        - name: parley
          image: ghcr.io/your-org/parley:latest # build from the repo Dockerfile
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APP_URL
              value: "https://chat.example.com" # public URL of this deployment
            - name: DEMO_AGENT
              value: "true"
            - name: DEMO_AGENT_URL
              value: "http://localhost:8080/v1"
          envFrom:
            - secretRef:
                name: parley
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
        - name: demo-agent
          image: ghcr.io/your-org/parley:latest
          command: ["bun", "run", "examples/demo-agent/server.ts"]
          ports:
            - name: demo-http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: demo-http
          livenessProbe:
            httpGet:
              path: /health
              port: demo-http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: parley
  namespace: parley
spec:
  selector:
    app: parley
  ports:
    - name: http
      port: 80
      targetPort: http
