name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Generates src/routeTree.gen.ts and dist/server/server.js as a
      # side effect of the TanStack Start Vite plugin, both of which
      # Typecheck below imports and needs to already exist on disk.
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  docker:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t parley:ci .

      - name: Smoke test the image
        run: |
          set -euo pipefail
          docker network create parley-ci
          docker run -d --name pg --network parley-ci \
            -e POSTGRES_USER=parley -e POSTGRES_PASSWORD=parley -e POSTGRES_DB=parley \
            postgres:17-alpine
          docker run -d --name redis --network parley-ci redis:7-alpine
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U parley -d parley && break || sleep 1
          done
          docker run -d --name parley --network parley-ci -p 3000:3000 \
            -e APP_URL=http://localhost:3000 \
            -e APP_SECRET="$(openssl rand -base64 32)" \
            -e DATABASE_URL=postgres://parley:parley@pg:5432/parley \
            -e REDIS_URL=redis://redis:6379 \
            parley:ci
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/api/health && exit 0 || sleep 2
          done
          echo "health check never became ready" >&2
          docker logs parley >&2
          exit 1
