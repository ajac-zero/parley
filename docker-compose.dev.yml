# Development infrastructure only (run the app with `bun run dev`).
#
# MinIO is exposed on the host at localhost:9000 (API) and localhost:9001
# (console, default creds parley/parleyparley) so `bun run dev` can reach it
# directly without any S3_* env vars needed beyond the defaults in env.ts.
name: parley-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: parley
      POSTGRES_DB: parley
    ports:
      # Host port 5433 to avoid clashing with a locally running Postgres.
      - "${PARLEY_DEV_PG_PORT:-5433}:5432"
    volumes:
      - parley_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley -d parley"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host port 6380 to avoid clashing with a locally running Redis.
      - "${PARLEY_DEV_REDIS_PORT:-6380}:6379"
    volumes:
      - parley_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: parley
      MINIO_ROOT_PASSWORD: parleyparley
    ports:
      - "${PARLEY_DEV_S3_PORT:-9000}:9000"
      - "${PARLEY_DEV_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - parley_dev_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: parley
      MINIO_ROOT_PASSWORD: parleyparley
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 parley parleyparley &&
      mc mb -p local/parley
      "

volumes:
  parley_dev_pg:
  parley_dev_redis:
  parley_dev_minio:
