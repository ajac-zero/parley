# Production-ish single-host deployment: Parley + Postgres + Redis + MinIO.
#
#   1. Generate a secret:  openssl rand -base64 32
#   2. APP_SECRET=... APP_URL=http://localhost:3000 docker compose up -d
#   3. Open http://localhost:3000 and create the first (admin) account.
#
# Note on attachments: the bundled `minio` service is only reachable on this
# compose network, not the public internet. That's fine if your agents run
# on the same network, but if you're calling an external cloud model
# provider (OpenAI, Anthropic, etc.), it can't fetch attachment URLs from
# your private MinIO. In that case either:
#   - set S3_PUBLIC_URL to a publicly reachable address for this MinIO
#     (e.g. behind a TLS-terminating reverse proxy), or
#   - point S3_ENDPOINT at a real public S3-compatible provider (S3, R2,
#     B2, ...) instead of the bundled `minio` service, and set
#     S3_PUBLIC_URL to that same endpoint.
# Leaving S3_PUBLIC_URL unset is always safe: attachments are inlined as
# base64 instead of sent as URLs.

services:
  parley:
    build: .
    # image: ghcr.io/your-org/parley:latest   # use a prebuilt image instead
    ports:
      - "${PORT:-3000}:3000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET (openssl rand -base64 32)}
      DATABASE_URL: postgres://parley:${POSTGRES_PASSWORD:-parley}@postgres:5432/parley
      REDIS_URL: redis://redis:6379
      DEMO_AGENT: ${DEMO_AGENT:-true}
      DEMO_AGENT_URL: ${DEMO_AGENT_URL:-http://demo-agent:8080/v1}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-parley}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-parley}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD (openssl rand -base64 32)}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      demo-agent:
        condition: service_healthy
    restart: unless-stopped

  demo-agent:
    build: .
    command: ["bun", "run", "examples/demo-agent/server.ts"]
    environment:
      DEMO_AGENT_PORT: "8080"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parley}
      POSTGRES_DB: parley
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley -d parley"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parley}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD (openssl rand -base64 32)}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot init container: creates the attachments bucket if it doesn't
  # already exist, then exits. `parley` waits on this completing.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parley}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD (openssl rand -base64 32)}
      S3_BUCKET: ${S3_BUCKET:-parley}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb -p local/$$S3_BUCKET
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
